name: Rollback Frontend

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to roll back to (must exist in s3://einarinau.com/releases/)'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback Frontend to ${{ inputs.sha }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify release exists in S3
        run: |
          # Validate SHA format to prevent command injection
          if ! echo "${{ inputs.sha }}" | grep -qE '^[0-9a-f]{7,40}$'; then
            echo "Invalid SHA format: ${{ inputs.sha }}"
            exit 1
          fi

          aws s3 ls "s3://${{ secrets.S3_BUCKET }}/releases/${{ inputs.sha }}/index.html"
          echo "Release ${{ inputs.sha }} verified in S3"

      - name: Update CloudFront Function
        run: |
          # Fetch current live function code
          aws cloudfront get-function \
            --name world-of-einari-rewrite \
            --stage LIVE \
            rewrite.js

          # Replace the LIVE_SHA value
          sed -i "s/var LIVE_SHA = \"[^\"]*\"/var LIVE_SHA = \"${{ inputs.sha }}\"/" rewrite.js

          # Get current ETag
          ETAG=$(aws cloudfront describe-function \
            --name world-of-einari-rewrite \
            --query 'ETag' \
            --output text)

          # Update function
          aws cloudfront update-function \
            --name world-of-einari-rewrite \
            --function-config Comment="Rewrites requests to the current live release prefix",Runtime=cloudfront-js-2.0 \
            --function-code fileb://rewrite.js \
            --if-match "$ETAG"

          # Get new ETag after update
          ETAG=$(aws cloudfront describe-function \
            --name world-of-einari-rewrite \
            --query 'ETag' \
            --output text)

          # Publish to LIVE stage
          aws cloudfront publish-function \
            --name world-of-einari-rewrite \
            --if-match "$ETAG"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
          echo "Frontend rolled back to ${{ inputs.sha }}"

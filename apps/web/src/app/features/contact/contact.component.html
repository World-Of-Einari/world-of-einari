<section class="contact" id="contact">
  <div class="contact__inner">
    <p class="contact__section-label">Contact</p>

    <h2 class="contact__title" appReveal>
      Let's build<br />
      <span class="contact__title-ghost">something</span>
    </h2>

    <p class="contact__sub" appReveal [appRevealDelay]="100">
      Open to senior / principal engineering roles, fractional CTO engagements, and the occasional
      interesting side project.
    </p>

    <a class="contact__email" [href]="'mailto:' + email()" appReveal [appRevealDelay]="200">{{
      email()
    }}</a>

    <div class="contact__social" appReveal [appRevealDelay]="300">
      @for (link of socialLinks(); track link.label) {
        <a class="contact__social-link" [href]="link.href" target="_blank" rel="noopener">
          {{ link.label }}
        </a>
      }
    </div>
  </div>
</section>

name: Rollback API

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Lambda version number to roll back to'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback Lambda to version ${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify version exists
        run: |
          aws lambda get-function \
            --function-name ${{ secrets.CHAT_LAMBDA_ARN }} \
            --qualifier ${{ inputs.version }} \
            --query 'Configuration.Version' \
            --output text

      - name: Update live alias
        run: |
          aws lambda update-alias \
            --function-name ${{ secrets.CHAT_LAMBDA_ARN }} \
            --name live \
            --function-version ${{ inputs.version }}
          echo "Live alias rolled back to version ${{ inputs.version }}"

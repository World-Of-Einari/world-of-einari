<section class="experience" id="experience">
  <p class="experience__section-label">Experience</p>

  <h2 class="experience__title" appReveal>
    Where I've<br />
    <em class="experience__title-ghost">shipped</em>
  </h2>

  <div class="experience__timeline">
    @for (item of experience(); track item.company; let i = $index) {
      <article class="experience__item" appReveal [appRevealDelay]="i * 100">
        <div class="experience__meta">
          <p class="experience__date">{{ item.date }}</p>
          <p class="experience__company">{{ item.company }}</p>
        </div>

        <div class="experience__body">
          <h3 class="experience__role">{{ item.role }}</h3>
          <p class="experience__desc">{{ item.description }}</p>
          <div class="experience__tags">
            @for (tag of item.tags; track tag) {
              <span class="experience__tag">{{ tag }}</span>
            }
          </div>
        </div>
      </article>
    }
  </div>
</section>

<section class="about" id="about">
  <p class="about__section-label">About</p>

  <div class="about__grid" appReveal>
    <div class="about__text">
      <h2 class="about__title">
        Building things<br />
        <em class="about__title-ghost">that matter</em>
      </h2>

      @for (para of paragraphs(); track $index) {
        <p class="about__paragraph" [innerHTML]="para"></p>
      }
    </div>

    <div class="about__skills">
      @for (group of skills(); track group.group) {
        <div class="about__skill-group">
          <p class="about__skill-label">{{ group.group }}</p>
          <div class="about__tags">
            @for (tag of group.tags; track tag) {
              <span class="about__tag" [class.about__tag--featured]="isFeatured(group, tag)">{{
                tag
              }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
